services:
  gharchive:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - ./data:/data
    # Compose loads a host `.env` for ${...} interpolation (see .env.example).
    environment:
      DATA_DIR: /data
      APP_URL: ${APP_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      # OIDC / SSO — leave empty for autologin (shows warning banner)
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      # Set to the Apprise API container (auto-fills Settings → Alerts → Apprise API URL)
      APPRISE_API_URL: ${APPRISE_API_URL:-http://apprise:8000}
    restart: unless-stopped

  apprise:
    image: caronc/apprise:latest
    ports:
      - '8000:8000'
    restart: unless-stopped
